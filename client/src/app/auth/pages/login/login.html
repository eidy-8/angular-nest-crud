
<div class="bg-neutral-primary-soft p-6 border border-default rounded-base shadow-xs max-w-md mx-auto">
    <form class="mx-auto">
      <h5 class="text-xl font-semibold text-heading mb-6">Login</h5>
      <div class="mb-5">
        <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Seu email</label>
        <input type="email" id="email" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Digite seu email" required />
      </div>
      <div class="mb-5">
        <label for="password" class="block mb-2.5 text-sm font-medium text-heading">Sua senha</label>
        <input type="password" id="password" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Digite sua senha" required />
      </div>
      <button type="submit" class="text-white bg-brand box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">Entrar</button>
    </form>
</div>
